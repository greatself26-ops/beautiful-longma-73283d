<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solar Proposal Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#0b1d3a;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#d4af37;
margin-bottom:20px;
}

.card{
background:#142b52;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

/* INPUT GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

/* INPUT FIELD */

.field{
display:flex;
flex-direction:column;
}

label{
font-size:13px;
margin-bottom:4px;
}

input{
padding:8px;
border-radius:5px;
border:none;
font-size:14px;
}

/* BUTTON */

button{
background:#d4af37;
border:none;
padding:10px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
width:200px;
}

button:hover{
background:#c7a42e;
}

.results{
background:#081428;
padding:20px;
border-radius:8px;
}

.result-title{
color:#d4af37;
margin-bottom:10px;
margin-top:10px;
}

canvas{
margin-top:20px;
background:white;
border-radius:8px;
padding:10px;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#bbb;
}

/* TABLET */

@media(max-width:900px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

/* MOBILE */

@media(max-width:600px){

.grid{
grid-template-columns:1fr;
}

button{
width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<h1>☀ Solar Proposal Calculator</h1>

<div class="card">

<div class="grid">

<div class="field">
<label>Customer Name</label>
<input id="customerName">
</div>

<div class="field">
<label>Location</label>
<input id="location">
</div>

<div class="field">
<label>Monthly EB Bill (₹)</label>
<input type="number" id="monthlyBill">
</div>

<div class="field">
<label>Annual Units Consumption</label>
<input type="number" id="annualUnits">
</div>

<div class="field">
<label>Solar Plant Capital Cost (₹)</label>
<input type="number" id="capitalCost">
</div>

</div>

<button onclick="calculate()">Calculate Proposal</button>

</div>

<div class="results" id="results"></div>

<canvas id="chart"></canvas>

<button onclick="window.print()">Print / Save Proposal</button>

<div class="footer">
Solar ROI Projection – 25 Year Financial Analysis
</div>

</div>

<script>

let chart;

function formatINR(num){
return num.toLocaleString("en-IN",{
style:"currency",
currency:"INR",
maximumFractionDigits:0
});
}

function calculate(){

let name=document.getElementById("customerName").value;
let city=document.getElementById("location").value;

let monthlyBill=Number(document.getElementById("monthlyBill").value);

let annualUnits=Number(document.getElementById("annualUnits").value);

let capital=Number(document.getElementById("capitalCost").value);

/* SOLAR SIZE */

let plantKW=annualUnits/1400;

/* PANEL CALCULATION */

let panelKW=0.54;

let panelsRequired=plantKW/panelKW;

let panelsDown=Math.floor(panelsRequired);

let panelsUp=Math.ceil(panelsRequired);

let plantDown=panelsDown*panelKW;

let plantUp=panelsUp*panelKW;

/* ELECTRICITY RATE */

let unitRate=monthlyBill/(annualUnits/12);

/* FINANCIAL */

let yearlyBill=monthlyBill*12;

let tariffIncrease=0.03;

let totalCost=0;

let labels=[];

let savings=[];

for(let year=1;year<=25;year++){

yearlyBill=yearlyBill*(1+tariffIncrease);

totalCost+=yearlyBill;

labels.push("Year "+year);

savings.push(Math.max(totalCost-capital,0));

}

/* PAYBACK */

let payback=capital/(monthlyBill*12);

/* RESULTS */

document.getElementById("results").innerHTML=`

<div class="result-title"><b>Customer</b></div>
${name} – ${city}

<div class="result-title"><b>Electricity Details</b></div>

Monthly EB Bill: ${formatINR(monthlyBill)}<br>
Estimated Unit Rate: ₹${unitRate.toFixed(2)} / unit

<div class="result-title"><b>Solar System Size</b></div>

Ideal System Size: ${plantKW.toFixed(2)} kW

<br><br>

<b>Round Down System</b><br>
Panels: ${panelsDown}<br>
Plant Size: ${plantDown.toFixed(2)} kW

<br><br>

<b>Round Up System</b><br>
Panels: ${panelsUp}<br>
Plant Size: ${plantUp.toFixed(2)} kW

<div class="result-title"><b>Financial Analysis</b></div>

Capital Investment: ${formatINR(capital)}<br>

Payback Period: ${payback.toFixed(1)} years

<br><br>

25 Year Electricity Cost: ${formatINR(totalCost)}

<br><br>

<span style="color:#4ade80;font-size:20px">
Total Savings in 25 Years: ${formatINR(totalCost-capital)}
</span>

`;

/* CHART */

if(chart){
chart.destroy();
}

chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Savings Over 25 Years",
data:savings,
borderWidth:3,
fill:true
}]
},

options:{
scales:{
y:{
ticks:{
callback:function(value){
return "₹"+value.toLocaleString("en-IN");
}
}
}
}
}

});

}

</script>

</body>
</html>
