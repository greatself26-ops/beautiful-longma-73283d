<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solar ROI Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0b1d3a);
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:25px;
}

h1{
text-align:center;
color:#FFD700;
letter-spacing:2px;
margin-bottom:20px;
}

.card{
background:rgba(20,43,82,0.9);
padding:20px;
border-radius:12px;
box-shadow:0 0 20px rgba(255,215,0,0.25);
margin-bottom:20px;
}

label{
display:block;
margin-top:10px;
font-size:13px;
}

input{
padding:5px;
border-radius:4px;
border:none;
text-align:center;
font-size:13px;
}

.input-table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

.input-table th,
.input-table td{
border:1px solid #444;
padding:4px;
text-align:center;
}

.input-table th{
background:#FFD700;
color:black;
}

.input-table input{
width:65px;
}

.buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}

button{
flex:1;
padding:7px;
border:none;
border-radius:6px;
background:#FFD700;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 12px #FFD700;
}

.report{
background:#020617;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.result-table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

.result-table th,
.result-table td{
border:1px solid #444;
padding:6px;
text-align:center;
}

.result-table th{
background:#FFD700;
color:black;
}

.highlight{
color:#4ade80;
font-weight:bold;
}

canvas{
background:white;
border-radius:8px;
margin-top:15px;
padding:8px;
width:100% !important;
}

@media print{

.card,.buttons{
display:none;
}

body{
background:white;
color:black;
}

}

</style>

</head>

<body>

<div class="container">

<h1>☀ SOLAR ROI ANALYZER</h1>

<div class="card">

<label>Name</label>
<input id="name" style="width:200px">

<label>Mobile</label>
<input id="mobile" style="width:200px">

<table class="input-table">

<tr>
<th>Period</th>
<th>Units</th>
<th>EB Bill</th>
</tr>

<tr><td>P1</td><td><input id="u1"></td><td><input id="b1"></td></tr>
<tr><td>P2</td><td><input id="u2"></td><td><input id="b2"></td></tr>
<tr><td>P3</td><td><input id="u3"></td><td><input id="b3"></td></tr>
<tr><td>P4</td><td><input id="u4"></td><td><input id="b4"></td></tr>
<tr><td>P5</td><td><input id="u5"></td><td><input id="b5"></td></tr>
<tr><td>P6</td><td><input id="u6"></td><td><input id="b6"></td></tr>

</table>

<label>Solar Plant Cost (₹)</label>
<input id="plantCost" style="width:150px">

<div class="buttons">

<button onclick="calculate()">Analyze</button>
<button onclick="generatePDF()">Download PDF</button>
<button onclick="shareWhatsApp()">WhatsApp</button>
<button onclick="window.print()">Print</button>

</div>

</div>

<div id="report" class="report">

<div id="results"></div>

<canvas id="historyChart"></canvas>

<canvas id="roiChart"></canvas>

</div>

</div>

<script>

let roiChart;
let historyChart;

function inr(x){
return x.toLocaleString("en-IN",{style:"currency",currency:"INR"})
}

function subsidyCalc(kW){

if(kW<=2) return kW*30000
if(kW<=3) return 60000+18000
return 78000

}

function calculate(){

let units=[+u1.value,+u2.value,+u3.value,+u4.value,+u5.value,+u6.value];
let bills=[+b1.value,+b2.value,+b3.value,+b4.value,+b5.value,+b6.value];

let labels=["P1","P2","P3","P4","P5","P6"];

let annualUnits=units.reduce((a,b)=>a+b,0);
let totalBill=bills.reduce((a,b)=>a+b,0);

let unitCost=totalBill/annualUnits;

let plantKW=annualUnits/1400;

let panelKW=0.54;

let panelsRequired=plantKW/panelKW;

let panelsDown=Math.floor(panelsRequired);
let panelsUp=Math.ceil(panelsRequired);

let plantDown=panelsDown*panelKW;
let plantUp=panelsUp*panelKW;

let panelArea=27.64;

let spaceDown=panelsDown*panelArea;
let spaceUp=panelsUp*panelArea;

let plantCost=+plantCostInput();

let subsidy=subsidyCalc(plantUp);

let netCost=plantCost-subsidy;

/* ROI */

let yearlyCost=totalBill;

let tariffRise=0.07;

let totalCost=0;

let roiLabels=[];
let savings=[];

for(let i=1;i<=25;i++){

yearlyCost*=1+tariffRise;

totalCost+=yearlyCost;

roiLabels.push("Year "+i);

savings.push(totalCost-netCost);

}

results.innerHTML=`

<table class="result-table">

<tr><th colspan="2">Solar System Analysis</th></tr>

<tr><td>Annual Consumption</td><td>${annualUnits} Units</td></tr>

<tr><td>Annual EB Bill</td><td>${inr(totalBill)}</td></tr>

<tr><td>Cost Per Unit</td><td>₹${unitCost.toFixed(2)}</td></tr>

<tr><td>Solar Plant Size</td><td>${plantKW.toFixed(2)} kW</td></tr>

<tr><td>Round Down System</td><td>${panelsDown} Panels (${plantDown.toFixed(2)} kW)</td></tr>

<tr><td>Round Up System</td><td>${panelsUp} Panels (${plantUp.toFixed(2)} kW)</td></tr>

<tr><td>Roof Space</td><td>${spaceDown.toFixed(0)} – ${spaceUp.toFixed(0)} sq.ft</td></tr>

<tr><td>Plant Cost</td><td>${inr(plantCost)}</td></tr>

<tr><td>Govt Subsidy</td><td>${inr(subsidy)}</td></tr>

<tr><td>Net Investment</td><td>${inr(netCost)}</td></tr>

<tr><td>25 Year Electricity Cost</td><td>${inr(totalCost)}</td></tr>

<tr><td class="highlight">Total Savings</td><td class="highlight">${inr(totalCost-netCost)}</td></tr>

</table>

`;

const ctx1=document.getElementById("historyChart");

if(historyChart) historyChart.destroy();

historyChart=new Chart(ctx1,{
type:"bar",
data:{
labels:labels,
datasets:[
{label:"Units",data:units,backgroundColor:"#FFD700"},
{label:"EB Bill",data:bills,backgroundColor:"#22c55e"}
]
}
});

const ctx2=document.getElementById("roiChart");

if(roiChart) roiChart.destroy();

roiChart=new Chart(ctx2,{
type:"line",
data:{
labels:roiLabels,
datasets:[{
label:"Savings Over 25 Years",
data:savings,
borderColor:"#FFD700",
borderWidth:3,
fill:true
}]
}
});

}

function plantCostInput(){
return document.getElementById("plantCost").value
}

async function generatePDF(){

const { jsPDF } = window.jspdf;

const element=document.getElementById("report");

const canvas=await html2canvas(element,{scale:2});

const img=canvas.toDataURL("image/png");

const pdf=new jsPDF("p","mm","a4");

const width=210;
const height=canvas.height*width/canvas.width;

pdf.addImage(img,"PNG",0,10,width,height);

pdf.save("solar-roi-report.pdf");

}

function shareWhatsApp(){

window.open("https://wa.me/?text=Solar ROI report generated. Please attach the PDF");

}

</script>

</body>

</html>
