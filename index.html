<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solar ROI Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--blue:#0b1d3a;
--card:#142b52;
--gold:#d4af37;
}

body{
margin:0;
font-family:Arial;
background:var(--blue);
color:white;
}

.container{
max-width:850px;
margin:auto;
padding:25px;
}

h1{
text-align:center;
color:var(--gold);
margin-bottom:20px;
}

/* CARD */

.card{
background:var(--card);
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

/* INPUTS */

label{
display:block;
margin-top:8px;
font-size:14px;
}

input{
padding:5px;
border-radius:4px;
border:none;
text-align:center;
font-size:13px;
}

/* INPUT TABLE */

.input-table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

.input-table th,
.input-table td{
border:1px solid #555;
padding:5px;
text-align:center;
}

.input-table th{
background:var(--gold);
color:black;
}

.input-table input{
width:70px;
height:22px;
}

/* BUTTONS */

.buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}

button{
flex:1;
padding:7px;
border:none;
border-radius:5px;
background:var(--gold);
font-weight:bold;
cursor:pointer;
font-size:13px;
}

/* REPORT */

.report{
background:#081428;
padding:15px;
border-radius:8px;
margin-top:15px;
}

/* RESULT TABLE */

.result-table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

.result-table th,
.result-table td{
border:1px solid #555;
padding:6px;
text-align:center;
}

.result-table th{
background:var(--gold);
color:black;
}

.highlight{
color:#4ade80;
font-weight:bold;
}

/* CHART */

canvas{
background:white;
border-radius:6px;
margin-top:15px;
padding:6px;
width:100% !important;
}

/* PRINT */

@media print{

.card,
.buttons{
display:none;
}

body{
background:white;
color:black;
}

}

</style>

</head>

<body>

<div class="container">

<h1>☀ Solar ROI Calculator</h1>

<div class="card">

<label>Name</label>
<input id="name" style="width:200px">

<label>Mobile Number</label>
<input id="mobile" style="width:200px">

<table class="input-table">

<tr>
<th>Period</th>
<th>Units</th>
<th>EB Bill (₹)</th>
</tr>

<tr><td>P1</td><td><input id="u1"></td><td><input id="b1"></td></tr>
<tr><td>P2</td><td><input id="u2"></td><td><input id="b2"></td></tr>
<tr><td>P3</td><td><input id="u3"></td><td><input id="b3"></td></tr>
<tr><td>P4</td><td><input id="u4"></td><td><input id="b4"></td></tr>
<tr><td>P5</td><td><input id="u5"></td><td><input id="b5"></td></tr>
<tr><td>P6</td><td><input id="u6"></td><td><input id="b6"></td></tr>

</table>

<label>Solar Plant Cost (₹)</label>
<input id="plantCost" style="width:150px">

<div class="buttons">

<button onclick="calculate()">Calculate</button>

<button onclick="generatePDF()">Download PDF</button>

<button onclick="shareWhatsApp()">WhatsApp</button>

<button onclick="window.print()">Print</button>

</div>

</div>

<div id="report" class="report">

<div id="results"></div>

<canvas id="historyChart"></canvas>

<canvas id="roiChart"></canvas>

</div>

</div>

<script>

let roiChart;
let historyChart;

function inr(x){
return x.toLocaleString("en-IN",{style:"currency",currency:"INR"})
}

function calculate(){

let units=[+u1.value,+u2.value,+u3.value,+u4.value,+u5.value,+u6.value];
let bills=[+b1.value,+b2.value,+b3.value,+b4.value,+b5.value,+b6.value];

let labels=["P1","P2","P3","P4","P5","P6"];

let annualUnits=units.reduce((a,b)=>a+b,0);
let totalBill=bills.reduce((a,b)=>a+b,0);

let unitCost=totalBill/annualUnits;

let plantKW=annualUnits/1400;

let panelKW=0.54;

let panels=Math.ceil(plantKW/panelKW);

let panelArea=27.64;

let space=panels*panelArea;

let co2=(annualUnits*25*0.82)/1000;

let capital=+plantCost.value;

let yearlyCost=totalBill;

let tariffRise=0.07;

let totalCost=0;

let roiLabels=[];
let savings=[];

for(let i=1;i<=25;i++){

yearlyCost*=1+tariffRise;

totalCost+=yearlyCost;

roiLabels.push("Year "+i);

savings.push(totalCost-capital);

}

results.innerHTML=`

<table class="result-table">

<tr><th colspan="2">Solar Analysis</th></tr>

<tr><td>Annual EB Consumption</td><td>${annualUnits} Units</td></tr>

<tr><td>Cost Per Unit</td><td>₹${unitCost.toFixed(2)}</td></tr>

<tr><td>Solar Plant Size</td><td>${plantKW.toFixed(2)} kW</td></tr>

<tr><td>Panels Required</td><td>${panels}</td></tr>

<tr><td>Roof Space Required</td><td>${space.toFixed(0)} sq.ft</td></tr>

<tr><td>CO₂ Saved</td><td>${co2.toFixed(1)} Tons</td></tr>

<tr><td>25 Year Electricity Cost</td><td>${inr(totalCost)}</td></tr>

<tr><td class="highlight">Total Savings</td><td class="highlight">${inr(totalCost-capital)}</td></tr>

</table>

`;

const ctx1=document.getElementById("historyChart");

if(historyChart) historyChart.destroy();

historyChart=new Chart(ctx1,{
type:"bar",
data:{
labels:labels,
datasets:[
{label:"Units",data:units,backgroundColor:"#d4af37"},
{label:"EB Bill",data:bills,backgroundColor:"#4ade80"}
]
}
});

const ctx2=document.getElementById("roiChart");

if(roiChart) roiChart.destroy();

roiChart=new Chart(ctx2,{
type:"line",
data:{
labels:roiLabels,
datasets:[{
label:"Savings Over 25 Years",
data:savings,
borderColor:"#d4af37",
borderWidth:3,
fill:true
}]
}
});

}

async function generatePDF(){

const { jsPDF } = window.jspdf;

const element=document.getElementById("report");

const canvas=await html2canvas(element,{scale:2});

const img=canvas.toDataURL("image/png");

const pdf=new jsPDF("p","mm","a4");

const width=210;
const height=canvas.height*width/canvas.width;

pdf.addImage(img,"PNG",0,10,width,height);

pdf.save("solar-roi-report.pdf");

}

function shareWhatsApp(){

window.open("https://wa.me/?text=Solar ROI report generated. Please attach the PDF");

}

</script>

</body>

</html>
